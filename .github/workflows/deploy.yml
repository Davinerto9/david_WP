name: Deploy Vite React App to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Verify dist contents (diagnostics)
        run: |
          echo "=== dist root ==="
          ls -la dist || true
          echo "=== recursive sizes ==="
          du -h --max-depth=3 dist || true
          echo "=== find file types (symlinks) ==="
          find dist -type l -ls || true
          echo "=== detailed file list ==="
          find dist -type f -maxdepth 5 -exec ls -lh {} \; || true
          echo "=== index.html head ==="
          if [ -f dist/index.html ]; then head -n 20 dist/index.html; else echo "ERROR: dist/index.html not found"; exit 1; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist


  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
